# =============================================================================
# AI 机会雷达 - Docker Compose 生产编排
# =============================================================================
# 启动：docker compose up -d
# 停止：docker compose down
# 日志：docker compose logs -f
# 初始化：docker compose exec app python scripts/seed_data.py
# =============================================================================

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-daily
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../backup:/app/backup
      - ../.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - ai-daily-net

  nginx:
    image: nginx:1.25-alpine
    container_name: ai-daily-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ai-daily-net

networks:
  ai-daily-net:
    driver: bridge
